<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery - Normal vs DoLA vs Early Stop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 300;
        }

        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* three columns */
            gap: 40px;
            margin-bottom: 40px;
        }

        .column {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .column h2 {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1.8em;
            font-weight: 400;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .normal-column h2 {
            color: #2563eb;
        }

        .dola-column h2 {
            color: #dc2626;
        }
        .earlystop-column h2 {
            color: #16a34a;
        }

        .image-item {
            margin-bottom: 30px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .image-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .prompt {
            background-color: #f8fafc;
            border-left: 4px solid #e2e8f0;
            padding: 15px 20px;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.6;
            color: #475569;
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        .normal-column .prompt {
            border-left-color: #3b82f6;
            background-color: #eff6ff;
        }

        .dola-column .prompt {
            border-left-color: #ef4444;
            background-color: #fef2f2;
        }
        .earlystop-column .prompt {
            border-left-color: #22c55e;
            background-color: #ecfdf5;
        }

        .image-container {
            text-align: center;
        }

        .image-container img {
            width: 90%; /* slightly shrink images to fit three columns nicely */
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .image-container img:hover {
            transform: scale(1.02);
        }

        .image-index {
            display: inline-block;
            background: #334155;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        @media (max-width: 1024px) {
            .gallery {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .column h2 {
                font-size: 1.5em;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
            }
            
            .column {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.8em;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

            <div class="column normal-column">

        function generateImageItems(containerId, folderName) {
            const container = document.getElementById(containerId);
            
            for (let i = 1; i <= 148; i++) {
                const item = document.createElement('div');
                item.className = 'image-item';
                
                const index = document.createElement('div');
                index.className = 'image-index';
                index.textContent = `#${i}`;
                
                const prompt = document.createElement('div');
                prompt.className = 'prompt';
                prompt.textContent = prompts[i - 1];
                
                const imageContainer = document.createElement('div');
                imageContainer.className = 'image-container';
                
                const img = document.createElement('img');
                img.src = `${folderName}/${i}.jpg`;
                img.alt = `Image ${i} from ${folderName}`;
                img.loading = 'lazy';
                
                imageContainer.appendChild(img);
                item.appendChild(index);
                item.appendChild(prompt);
                item.appendChild(imageContainer);
                container.appendChild(item);
            }
        }

        // Generate images for all columns
        generateImageItems('normal-images', 'normal');
        generateImageItems('dola-images', 'dola');
        generateImageItems('earlystop-images', 'earlystop');
